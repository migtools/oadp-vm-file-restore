---
# Simulate Backup 1 - Clone current VM disk (Jan 15 snapshot)
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: backup-20240115-rootdisk
  namespace: oadp-file-server-live-test
  labels:
    backup: "20240115"
    vm: test-vm-live
spec:
  accessModes:
    - ReadWriteOnce
  volumeMode: Block
  resources:
    requests:
      storage: 10Gi
  storageClassName: ocs-storagecluster-ceph-rbd-virtualization
  dataSource:
    kind: PersistentVolumeClaim
    name: test-vm-live-rootdisk

---
