# This rule is not used by the project oadp-vm-file-restore itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to oadp.openshift.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: oadp-vm-file-restore
    app.kubernetes.io/managed-by: kustomize
  name: virtualmachinebackupsdiscovery-viewer-role
rules:
- apiGroups:
  - oadp.openshift.io
  resources:
  - virtualmachinebackupsdiscoveries
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - oadp.openshift.io
  resources:
  - virtualmachinebackupsdiscoveries/status
  verbs:
  - get
